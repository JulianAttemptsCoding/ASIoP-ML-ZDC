# A100 config — pi0/gamma classification + energy/angle regression
# Training: 880k pi0 + 880k gamma events, 0-4 mrad, log-uniform energy
# Validation: 300k per class
# Classification cut: sigmoid output < 0.3 -> gamma, >= 0.3 -> pi0

data_dir: /path/to/root/files        # TODO
output_dir: outputs/a100_pi0_gamma

detector_branch: ZDCHcalHitsReco     # TODO: confirm
mc_branch: MCParticles

sampling_fraction: 0.021
energy_threshold: 0.00025
time_cut: 275.0
theta_max: 4.0                       # fiducial for classification (paper: 0-4 mrad)

k_neighbors: 10
node_features:
  - log_energy
  - x
  - y
  - z

task: pi0_gamma
alpha: 0.75                          # L = (1-alpha)*L_class + alpha*L_reg (Eq. 1)
classification_cut: 0.3              # below -> gamma, above -> pi0

model_type: deepsets
num_blocks: 1
latent_dim: 64
layers_per_block: 4
activation: relu
use_layer_norm: true
skip_connections: true

batch_size: 512
num_epochs: 100
learning_rate: 1.0e-3
lr_halve_every: 5
lr_min: 1.0e-6
loss: mae

num_procs: 16
already_preprocessed: false
gpu_memory_fraction: 0.95
