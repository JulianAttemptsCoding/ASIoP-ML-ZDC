# Base configuration — paper: arXiv:2406.12877v2
# Reference code: github.com/eiccodesign/regressiononly (zdc_classification branch)
# Zenodo models: doi.org/10.5281/zenodo.11187659

# ----- Data -----
data_dir: /path/to/root/files        # TODO: set to your sim output dir
output_dir: outputs/default

# ROOT branch names — adjust to match your simulation output
detector_branch: ZDCHcalHitsReco     # TODO: confirm branch name from your sim
mc_branch: MCParticles

train_files: []   # populated at runtime from data_dir
val_files: []

# ----- Hit selection (paper Sec. 3) -----
sampling_fraction: 0.021             # 2.1%, calibrated from electron sim
energy_threshold: 0.00025            # 0.5 MIP, 1 MIP = 0.5 MeV estimated from muon sim
time_cut: 275.0                      # ns
theta_max: 5.0                       # mrad, fiducial for training

# ----- Graph construction -----
k_neighbors: 10                      # paper: "ten nearest neighbors"
node_features:                       # order matters — fed directly to model
  - log_energy                       # log10(E / GeV)
  - x
  - y
  - z

# ----- Task -----
# 'neutron'     : predict E_truth, theta_truth (regression only)
# 'pi0_gamma'   : predict E_truth, theta_truth + particle type (classification)
# 'multi_neutron': predict total E_truth of Nn neutrons
task: neutron
alpha: 0.75                          # classification/regression balance (Eq. 1 in paper)

# ----- Model (paper Sec. 3.1) -----
model_type: deepsets                 # 'deepsets' or 'graphnetwork'
num_blocks: 1
latent_dim: 64
layers_per_block: 4
activation: relu
use_layer_norm: true
skip_connections: true               # concat_input

# ----- Training -----
batch_size: 256                      # paper value
num_epochs: 100
learning_rate: 1.0e-3
lr_halve_every: 5                    # epochs
lr_min: 1.0e-6
loss: mae                            # mae | mse

# ----- Compute -----
num_procs: 8                         # preprocessing workers
already_preprocessed: false          # set true after first run to skip re-preprocessing
gpu_memory_fraction: 0.9
