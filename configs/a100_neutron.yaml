# A100 config — single-neutron energy + angle regression
# Training: 750k events, 10-300 GeV log-uniform, theta 0-5 mrad, phi 0-360 deg
# Validation: 250k events

data_dir: /path/to/root/files        # TODO
output_dir: outputs/a100_neutron

detector_branch: ZDCHcalHitsReco     # TODO: confirm
mc_branch: MCParticles

sampling_fraction: 0.021
energy_threshold: 0.00025
time_cut: 275.0
theta_max: 5.0

k_neighbors: 10
node_features:
  - log_energy
  - x
  - y
  - z

task: neutron
alpha: 0.75

model_type: deepsets
num_blocks: 1
latent_dim: 64
layers_per_block: 4
activation: relu
use_layer_norm: true
skip_connections: true

batch_size: 512                      # A100 can handle larger batches
num_epochs: 100
learning_rate: 1.0e-3
lr_halve_every: 5
lr_min: 1.0e-6
loss: mae

num_procs: 16
already_preprocessed: false
gpu_memory_fraction: 0.95
